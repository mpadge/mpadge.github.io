  rosstatus: ''
  title: Trace Function Parameter Types
  description: |-
    The 'R' language includes a set of defined types, but the
    language itself is "absurdly dynamic" (Turcotte & Vitek (2019)
    <doi:10.1145/3340670.3342426>), and lacks any way to specify
    which types are expected by any expression. The 'typetracer'
    package enables code to be traced to extract detailed
    information on the properties of parameters passed to 'R'
    functions. 'typetracer' can trace individual functions or
    entire packages.
