{{> header}}

<div class = "backgroundClass">

    {{> mpadge}}

    <a href="../index.html" style="color:#262626;">
        <div class="grid-y grid-margin y">
            <div class="cell"><h2 align="center">code</h2></div>
            <div class="cell"><h4 align="center">all R packages</h4></div>
        </div>
    </a>

    <section id="code">
    {{> sections_header}}
    {{#each code}}
    <div class="code-item medium-4 large-2 cell">
    {{> code_header}}
    <a target="_blank" rel="noopener noreferrer"
                       href="{{ link }}", style="color:#262626;">
        <div align="center">
            <h3>{{ package }}</h3>
        </div>
        <p align="center">
        <option "{{ cran }}"="yes">
        <a href="{{ cranlink }}">
            <!--<img src="{{ cranlogs }}" alt="CRAN Downloads"/>-->
            <img src="{{ cranlogs }}">
        </a>
        </option>
        {{#if roslink}}
        <option "{{ ros }}"="yes">
        <a href="{{ roslink }}">
            <img src="{{ rosstatus }}"/>
        </a>
        </option>
        {{/if}}
        </p>
        <div class="card-section" align="center">
            <p>{{ title }}</p>
        </div>
    </a>
    {{> code_footer}}
    </div>
    {{/each}}
    {{> sections_footer}}
    </section>

    {{> footer}}

</div>
