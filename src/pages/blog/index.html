{{> header}}

<div class = "backgroundClass">

    <a href="../" style="color:#262626;">
        <div class="grid-y grid-margin y">
            <div class="cell"><h2 style="text-align: center;">blog</h2></div>
            <div class="cell"><h4 style="text-align: center;">R, C++, spatial, open data</h4></div>
        </div>
    </a>

    {{> sections_header}}
    {{#each blog}}
    {{> blog_header}}
    <a href="{{ link }}" style="color:#262626;">
        <div style="text-align: center;">
            <h3>{{ title }}</h3>
        </div>
        <div style="text-align: center;">
            <p style="color:#888888;">{{ created }}</p>
        </div>
        <div style="text-align: center;">
            <p>{{ description }}</p>
        </div>
    </a>
    {{> blog_footer}}
    {{/each}}
    {{> sections_footer}}

</div>
    {{> footer}}
